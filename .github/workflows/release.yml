name: Build & Release Elio

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false 

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install . pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller elio.spec

      - name: Build Windows Setup Wizard
        if: matrix.os == 'windows-latest'
        run: iscc installer.iss

      - name: Install FPM for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Build .deb (Linux only)
        if: runner.os == 'Linux'
        run: |
          mkdir -p pkg/usr/local/bin
          cp dist/elio pkg/usr/local/bin/
          fpm -s dir -t deb -n elio -v ${{ github.ref_name }} --prefix / -C pkg .
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Build .pkg Installer (macOS only)
        if: runner.os == 'macOS'
        run: |
          # Create the folder structure Macs expect
          mkdir -p mac_pkg/usr/local/bin
          cp dist/elio mac_pkg/usr/local/bin/
          chmod +x mac_pkg/usr/local/bin/elio
          
          # Build the official Apple Installer package
          pkgbuild --root mac_pkg --identifier com.elio.cli --version ${{ github.ref_name }} --install-location / Elio-macOS.pkg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Elio-Setup.exe
            Elio-macOS.pkg
            *.deb