name: Build & Release Elio

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      # This stops GitHub from cancelling everything if just one OS fails
      fail-fast: false 

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Changed to install without the missing [dev] flag
        run: pip install . pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller elio.spec

      - name: Install FPM for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Build .deb (Linux only)
        if: runner.os == 'Linux'
        run: |
          mkdir -p pkg/usr/local/bin
          cp dist/elio pkg/usr/local/bin/
          fpm -s dir -t deb -n elio -v ${{ github.ref_name }} --prefix / -C pkg .
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Build .dmg (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg-contents
          cp dist/elio dmg-contents/
          hdiutil create -volname Elio -srcfolder dmg-contents -ov -format UDZO Elio-macOS.dmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/elio*
            *.deb
            *.dmg
            *.exe